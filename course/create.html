<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>course selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <script>
        window.assetVersion = Date.now().toString();
        window.assetUrl = (path) => `${path}?v=${window.assetVersion}`;
        document.write(`<link rel="stylesheet" href="${window.assetUrl("global.css")}">`);
    </script>
</head>
<body>
    <div id="top">
        <a href="index.html">
            <h1>Course Selector</h1>
        </a>
    </div>
    <div id="main">
        <div id="selectionContainer">
            <button id="print">Print</button>
            <span id="selectionText"></span>
        </div>
        <button id="left">&lt;</button>
        <button id="right">&gt;</button>
    </div>
    <script>
        document.write(`<script src="${window.assetUrl("js/global.js")}"><\/script>`);
        document.write(`<script src="${window.assetUrl("https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js")}"><\/script>`);
        document.write(`<script type="module" src="${window.assetUrl("js/create.js")}"><\/script>`);
    </script>
</body>
</html>
