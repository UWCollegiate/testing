<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>course selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <script>
        window.assetVersion = Date.now().toString();
        window.assetUrl = (path) => `${path}?v=${window.assetVersion}`;
        document.write(`<link rel="stylesheet" href="${window.assetUrl("global.css")}">`);
    </script>
</head>
<body>
    <div id="top">
        <a href="index.html">
            <h1>Course Selector</h1>
        </a>
        <!-- doing this because putting it in an <a> messes with the formating -->
        <button id="add" onclick="location.href = 'new.html'">Add Course</button>
        <button id="create" onclick="location.href = 'create.html'">Create Schedules</button>
    </div>
    <div id="main">
        <div id="courseContainer"></div>
    </div>
    <button id="restrictions" onclick="location.href = 'restrictions.html'">Change Restrictions</button>
    <script>
        document.write(`<script src="${window.assetUrl("js/global.js")}"><\/script>`);
        document.write(`<script src="${window.assetUrl("js/index.js")}"><\/script>`);
    </script>
</body>
</html>
